<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Tycoon - Food Evolution</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #1d1d1f; --main-text: #1d1d1f; --sub-text: #86868b;
            --card-bg: #ffffff; --body-bg: #f5f5f7; --modal-overlay: rgba(0, 0, 0, 0.4); --blue: #007aff;
            --ach-off: #d2d2d7; --ach-on: #1d1d1f; --danger: #ff3b30; --line: rgba(0,0,0,0.08);
            --gold: #ffab00;
        }
        body.dark-mode {
            --main-text: #f5f5f7; --sub-text: #a1a1a6;
            --card-bg: #1c1c1e; --body-bg: #000000; --modal-overlay: rgba(0, 0, 0, 0.6);
            --ach-off: #3a3a3c; --ach-on: #ffffff; --line: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; background: var(--body-bg); color: var(--main-text);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
            letter-spacing: -0.02em; overflow: hidden; touch-action: none; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            height: 100vh; transition: background 0.3s, color 0.3s;
            padding-top: 70px; 
        }

        .icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        #header { width: 100%; text-align: center; z-index: 10; margin-bottom: 20px; }
        .gold-display { font-size: 38px; font-weight: 800; color: var(--gold); text-shadow: 0 4px 15px rgba(255, 171, 0, 0.2); word-break: break-all; padding: 0 20px; }
        .gps-display { font-size: 14px; font-weight: 600; color: var(--sub-text); margin-top: 5px; }

        #main-card {
            background: var(--card-bg); width: 90%; max-width: 400px; padding: 30px 20px 40px; 
            border-radius: 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            z-index: 10; display: flex; flex-direction: column; align-items: center;
            transition: background 0.3s;
        }

        #grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            background: var(--body-bg); padding: 15px; border-radius: 30px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05); width: 100%;
            touch-action: none;
        }
        body.dark-mode #grid { box-shadow: inset 0 4px 10px rgba(0,0,0,0.3); }

        .slot {
            width: 100%; aspect-ratio: 1 / 1; background: var(--card-bg);
            border-radius: 20%; position: relative; cursor: grab;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex; align-items: center; justify-content: center;
        }
        .slot:active { cursor: grabbing; }

        .item {
            width: 100%; height: 100%; border-radius: 20%;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(24px, 7vw, 34px); position: absolute; z-index: 2;
            background: var(--card-bg); box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            user-select: none; pointer-events: none;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 30px; }
        button { 
            border: none; border-radius: 22px; font-size: 16px; font-weight: 700; 
            padding: 20px; cursor: pointer; transition: 0.3s; width: 100%; 
        }
        #spawn-btn { background: var(--main-text); color: var(--card-bg); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #spawn-btn:active { transform: scale(0.96); }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; padding: 14px 28px;
            border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 2000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); pointer-events: none;
        }
        body.dark-mode #toast { background: rgba(255,255,255,0.9); color: black; }

        #menu-trigger {
            position: absolute; top: 20px; left: 20px; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1100;
        }
        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); z-index: 1040; display: none; backdrop-filter: blur(4px);
        }
        #sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--card-bg); z-index: 1050; transition: 0.4s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.05); padding: 50px 20px 30px; display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }
        
        /* 프로필 영역 추가 */
        #sidebar-profile { text-align: center; padding-bottom: 20px; border-bottom: 1px solid var(--line); margin-bottom: 10px; }
        .avatar-circle { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: background 0.3s; }
        #sb-nickname { font-weight: 800; font-size: 18px; margin-bottom: 5px; }
        #sb-score { font-size: 13px; font-weight: 700; color: var(--gold); }

        .nav-item {
            padding: 18px 10px; font-size: 16px; font-weight: 600; color: var(--main-text);
            border-bottom: 1px solid var(--line); cursor: pointer; display: flex; align-items: center; gap: 12px;
        }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); display: none; justify-content: center; align-items: flex-end;
            z-index: 1200; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 500px; height: 80vh;
            border-radius: 30px 30px 0 0; display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .drag-zone { padding: 12px 0 20px 0; flex-shrink: 0; cursor: grab; }
        .modal-handle { width: 36px; height: 5px; background: var(--ach-off); border-radius: 3px; margin: 0 auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 0 25px; margin-bottom: 10px; }
        #modal-title { flex: 1; text-align: center; margin-left: 35px; font-size: 20px; font-weight: 800; }
        .scroll-area { overflow-y: auto; flex-grow: 1; padding: 0 30px 40px 30px; color: var(--main-text); }
        
        .rank-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; border-bottom: 1px solid var(--line); }
        .rank-number { font-weight: 800; width: 30px; font-size: 16px; color: var(--sub-text); text-align: center; }
        
        .shop-item { display: flex; justify-content: space-between; align-items: center; background: var(--body-bg); padding: 12px 18px; border-radius: 20px; margin-bottom: 10px; transition: 0.2s; }
        .shop-btn { padding: 10px 18px; border-radius: 16px; font-size: 14px; font-weight: 700; width: auto; box-shadow: none; }
        .btn-buy { background: var(--gold); color: white; }
        .btn-equip { background: var(--blue); color: white; }
        .btn-equipped { background: var(--sub-text); color: white; cursor: default; }

        #login-screen, #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--body-bg); z-index: 3000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: var(--main-text);
            transition: opacity 0.5s;
        }
        #login-screen h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        #login-screen p { color: var(--sub-text); margin-bottom: 40px; font-weight: 600; }
        .google-btn {
            background: white; border: 1px solid #ddd; padding: 15px 30px; border-radius: 30px;
            font-size: 16px; font-weight: 700; color: #3c4043; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; width: auto;
        }
        .google-btn:active { transform: scale(0.96); }

        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--line); font-weight: 600; }
        .switch { position: relative; display: inline-block; width: 51px; height: 31px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e9e9eb; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 27px; width: 27px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="font-size: 60px; margin-bottom: 15px;">🍳</div>
        <h1>머지 푸드 타이쿤</h1>
        <p>구글 계정으로 로그인하고 요리를 시작하세요!</p>
        <button class="google-btn" onclick="loginWithGoogle()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21.5 12.2c0-.8-.1-1.5-.2-2.2H12v4h5.5c-.2 1.2-.9 2.2-1.9 2.9v2.4h3.1c1.8-1.7 2.8-4.1 2.8-7.1z" fill="#4285F4"/><path d="M12 22c2.7 0 4.9-.9 6.5-2.4l-3.1-2.4c-.9.6-2 .9-3.4.9-2.6 0-4.8-1.7-5.6-4.1H3.2v2.5C4.8 19.8 8.1 22 12 22z" fill="#34A853"/><path d="M6.4 14c-.2-.6-.3-1.2-.3-1.9 0-.7.1-1.3.3-1.9V7.7H3.2C2.4 9 2 10.5 2 12s.4 3 1.2 4.3l3.2-2.3z" fill="#FBBC05"/><path d="M12 5.9c1.4 0 2.7.5 3.7 1.4l2.8-2.8C16.9 2.9 14.7 2 12 2 8.1 2 4.8 4.2 3.2 7.7l3.2 2.5c.8-2.4 3-4.1 5.6-4.1z" fill="#EA4335"/></svg>
            구글로 계속하기
        </button>
    </div>

    <div id="loading-screen" style="display: none;">
        <div style="font-size: 40px; margin-bottom: 20px;">🔄</div>
        <div style="font-weight: bold;">주방을 불러오는 중...</div>
    </div>

    <div id="toast">알림</div>

    <div id="menu-trigger" onclick="toggleSidebar()">
        <svg class="icon" viewBox="0 0 24 24"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <div id="sidebar">
        <div id="sidebar-profile">
            <div id="sb-avatar" class="avatar-circle">👨‍🍳</div>
            <div id="sb-nickname">로딩 중...</div>
            <div id="sb-score">🏆 0</div>
        </div>
        
        <div class="nav-item" onclick="openModal('shop'); toggleSidebar();">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            상점 & 프로필
        </div>
        <div class="nav-item" onclick="openModal('rank'); toggleSidebar();">
            <svg class="icon" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"></path></svg>
            미슐랭 랭킹
        </div>
        <div class="nav-item" onclick="openModal('settings'); toggleSidebar();">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            설정
        </div>
        <div class="nav-item" id="logout-btn" style="margin-top: auto;">
            <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            로그아웃
        </div>
    </div>

    <div id="header">
        <div class="gold-display">$ <span id="gold-val">0</span></div>
        <div class="gps-display">초당 수익 +$ <span id="gps-val">0</span></div>
    </div>

    <div id="main-card">
        <div id="grid"></div>
        <div class="btn-group">
            <button id="spawn-btn" onclick="spawnItem()">⚡ 재료 생성</button>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" id="main-modal" onclick="event.stopPropagation()">
            <div class="drag-zone" id="dragZone"><div class="modal-handle"></div></div>
            <div class="modal-header">
                <h2 id="modal-title">메뉴</h2>
                <span id="modal-close-btn" style="color:var(--blue); font-weight:700; cursor:pointer;" onclick="closeModal()">닫기</span>
            </div>
            <div class="scroll-area" id="modal-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnxyvzVbz8DmDGZnQ-LRUS8TYvycRGero",
            authDomain: "mergebob-5e459.firebaseapp.com",
            projectId: "mergebob-5e459",
            storageBucket: "mergebob-5e459.firebasestorage.app",
            messagingSenderId: "17228754561",
            appId: "1:17228754561:web:1e151e3cff70d928c1a780",
            measurementId: "G-QH3KCEM3NX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const ITEM_DATA = [
            "🌾", "🥚", "🥛", "🧀", "🍞", "🥐", "🥖", "🥞", "🧇", "🍟", 
            "🥗", "🥪", "🌮", "🌯", "🍜", "🍝", "🍛", "🍣", "🍤", "🍔", 
            "🍕", "🍗", "🍖", "🥩", "🍲", "🦞", "🍱", "🍮", "🍩", "🍰", "🎂"
        ];
        
        // 🛒 상점 아이템 데이터
        const SHOP_ICONS = [
            { icon: "👨‍🍳", price: 0, name: "초보 셰프" },
            { icon: "👩‍🍳", price: 5000, name: "베이커리 파티시에" },
            { icon: "🐱", price: 20000, name: "고양이 요리사" },
            { icon: "🤖", price: 100000, name: "자동화 로봇" },
            { icon: "👑", price: 500000, name: "전설의 미슐랭" }
        ];

        const SHOP_COLORS = [
            { id: "color_default", color: "#f5f5f7", price: 0, name: "클린 화이트" },
            { id: "color_pink", color: "#ffebee", price: 10000, name: "스트로베리 핑크" },
            { id: "color_blue", color: "#e3f2fd", price: 10000, name: "오션 블루" },
            { id: "color_gold", color: "#fff8c4", price: 50000, name: "프리미엄 골드" },
            { id: "color_dark", color: "#2c2c2e", price: 50000, name: "시크 블랙" }
        ];
        
        // 🚨 game 객체 확장 (score, 프로필 추가)
        let game = {
            gold: 0, score: 0, 
            slots: Array(16).fill(null), maxLv: 1, darkMode: false, lastSaveTime: Date.now(),
            profileIcon: "👨‍🍳", profileColor: "#f5f5f7",
            ownedIcons: ["👨‍🍳"], ownedColors: ["color_default"]
        };

        let dbSaveTimer;

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<16; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.dataset.idx = i;
                slot.addEventListener('pointerdown', (e) => handlePointerDown(i, e));
                grid.appendChild(slot);
            }
        }

        window.spawnItem = function() {
            const emptyIdx = game.slots.findIndex(s => s === null);
            if(emptyIdx === -1) { showToast("빈 슬롯이 없습니다!"); return; }
            addItem(1, emptyIdx, true);
        };

        function addItem(lv, idx, animate = false) {
            const slot = document.querySelectorAll('.slot')[idx];
            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = ITEM_DATA[lv-1] || "👑";
            item.dataset.lv = lv;
            slot.appendChild(item);
            game.slots[idx] = lv;

            if(animate) {
                gsap.from(item, { scale: 0, duration: 0.3, ease: "back.out" });
                if(lv > game.maxLv) {
                    game.maxLv = lv;
                    showToast(`🎉 새로운 요리 발견! (Lv.${lv})`);
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            }
        }

        let dragTarget = null, startX, startY, originIdx;

        function handlePointerDown(idx, e) {
            if(!game.slots[idx]) return;
            e.preventDefault(); 
            originIdx = idx;
            const slot = document.querySelectorAll('.slot')[idx];
            dragTarget = slot.querySelector('.item');
            if(!dragTarget) return;

            startX = e.clientX; 
            startY = e.clientY;
            dragTarget.style.zIndex = 1000;
            
            document.addEventListener('pointermove', handlePointerMove);
            document.addEventListener('pointerup', handlePointerUp);
            document.addEventListener('pointercancel', handlePointerUp);
        }

        function handlePointerMove(e) {
            if(!dragTarget) return;
            e.preventDefault();
            gsap.set(dragTarget, { x: e.clientX - startX, y: e.clientY - startY });
        }

        function handlePointerUp(e) {
            if(!dragTarget) return;
            document.removeEventListener('pointermove', handlePointerMove);
            document.removeEventListener('pointerup', handlePointerUp);
            document.removeEventListener('pointercancel', handlePointerUp);

            dragTarget.style.visibility = 'hidden';
            const dropElem = document.elementFromPoint(e.clientX, e.clientY);
            dragTarget.style.visibility = 'visible';
            
            const dropSlot = dropElem ? dropElem.closest('.slot') : null;
            
            if(dropSlot) {
                const toIdx = parseInt(dropSlot.dataset.idx);
                
                if(toIdx !== originIdx && game.slots[toIdx] === game.slots[originIdx]) {
                    const nextLv = game.slots[originIdx] + 1;
                    document.querySelectorAll('.slot')[originIdx].innerHTML = '';
                    document.querySelectorAll('.slot')[toIdx].innerHTML = '';
                    game.slots[originIdx] = null;
                    game.slots[toIdx] = null;
                    addItem(nextLv, toIdx, true);
                    if (navigator.vibrate) navigator.vibrate(50);
                } 
                else if(toIdx !== originIdx && game.slots[toIdx] === null) {
                    const currentLv = game.slots[originIdx];
                    document.querySelectorAll('.slot')[originIdx].innerHTML = '';
                    game.slots[originIdx] = null;
                    addItem(currentLv, toIdx, false);
                }
                else if(toIdx !== originIdx && game.slots[toIdx] !== null) {
                    const originLv = game.slots[originIdx];
                    const targetLv = game.slots[toIdx];
                    document.querySelectorAll('.slot')[originIdx].innerHTML = '';
                    document.querySelectorAll('.slot')[toIdx].innerHTML = '';
                    game.slots[originIdx] = targetLv;
                    game.slots[toIdx] = originLv;
                    addItem(targetLv, originIdx, false);
                    addItem(originLv, toIdx, false);
                }
                else { gsap.to(dragTarget, { x: 0, y: 0, duration: 0.2 }); }
            } else { gsap.to(dragTarget, { x: 0, y: 0, duration: 0.2 }); }
            
            if(dragTarget) dragTarget.style.zIndex = 2;
            dragTarget = null;
        }

        window.toggleSidebar = () => {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebar-overlay');
            const isOpen = sb.classList.toggle('open');
            ov.style.display = isOpen ? 'block' : 'none';
        };

        // 🚨 모달 로직 (상점 추가, 랭킹 업데이트)
        window.openModal = async (type) => {
            const body = document.getElementById('modal-body');
            const title = document.getElementById('modal-title');
            body.innerHTML = '';

            if(type === 'shop') {
                title.innerText = '상점 & 프로필 🛒';
                
                let html = `<div style="margin-bottom:25px;">
                    <h3 style="margin-bottom:10px; font-size:16px; color:var(--sub-text);">아이콘 장착</h3>`;
                
                SHOP_ICONS.forEach(item => {
                    const isOwned = game.ownedIcons.includes(item.icon);
                    const isEquipped = game.profileIcon === item.icon;
                    let btnHtml = isEquipped 
                        ? `<button class="shop-btn btn-equipped" disabled>장착 중</button>`
                        : isOwned 
                            ? `<button class="shop-btn btn-equip" onclick="equipItem('icon', '${item.icon}')">장착</button>`
                            : `<button class="shop-btn btn-buy" onclick="buyItem('icon', '${item.icon}', ${item.price})">$${item.price.toLocaleString()}</button>`;
                            
                    html += `
                        <div class="shop-item">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <span style="font-size:26px;">${item.icon}</span> <b style="font-size:15px;">${item.name}</b>
                            </div>
                            ${btnHtml}
                        </div>`;
                });

                html += `</div><div>
                    <h3 style="margin-bottom:10px; font-size:16px; color:var(--sub-text);">배경색 장착</h3>`;
                
                SHOP_COLORS.forEach(item => {
                    const isOwned = game.ownedColors.includes(item.id);
                    const isEquipped = game.profileColor === item.color;
                    let btnHtml = isEquipped 
                        ? `<button class="shop-btn btn-equipped" disabled>장착 중</button>`
                        : isOwned 
                            ? `<button class="shop-btn btn-equip" onclick="equipItem('color', '${item.color}')">장착</button>`
                            : `<button class="shop-btn btn-buy" onclick="buyItem('color', '${item.id}', ${item.price}, '${item.color}')">$${item.price.toLocaleString()}</button>`;
                            
                    html += `
                        <div class="shop-item">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div style="width:26px; height:26px; border-radius:50%; background:${item.color}; border:1px solid rgba(0,0,0,0.1);"></div> 
                                <b style="font-size:15px;">${item.name}</b>
                            </div>
                            ${btnHtml}
                        </div>`;
                });
                html += `</div>`;
                body.innerHTML = html;
            } 
            else if(type === 'rank') {
                title.innerText = '미슐랭 랭킹 🏆';
                body.innerHTML = '<div style="text-align:center; padding:30px;">데이터를 불러오는 중...</div>';
                try {
                    // 이제 totalGold가 아닌 score(누적점수) 기준으로 랭킹 조회
                    const q = query(collection(db, "users"), orderBy("score", "desc"), limit(10));
                    const snap = await getDocs(q);
                    let html = "", rank = 1;
                    snap.forEach(d => {
                        const data = d.data();
                        let rankIcon = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;
                        let pIcon = data.profileIcon || "👨‍🍳";
                        let pColor = data.profileColor || "#f5f5f7";
                        let dScore = data.score || data.totalGold || 0; // 하위호환
                        
                        html += `<div class="rank-row">
                                    <div style="display:flex; align-items:center; gap:12px;">
                                        <span class="rank-number">${rankIcon}</span>
                                        <div style="width:40px; height:40px; border-radius:50%; background:${pColor}; display:flex; align-items:center; justify-content:center; font-size:22px; border:1px solid rgba(0,0,0,0.05);">
                                            ${pIcon}
                                        </div>
                                        <b style="font-size:15px;">${data.nickname}</b>
                                    </div>
                                    <div style="font-weight:800; color:var(--gold); font-size:15px;">🏆 ${(dScore).toLocaleString()}</div>
                                 </div>`;
                        rank++;
                    });
                    body.innerHTML = html || "<div style='text-align:center; padding:20px;'>아직 랭킹 데이터가 없습니다.</div>";
                } catch(e) {
                    console.error(e);
                    body.innerHTML = "<div style='text-align:center; padding:20px; color:var(--danger);'>랭킹을 불러오는데 실패했습니다. (첫 실행 시 DB 인덱스 생성 대기가 필요할 수 있습니다.)</div>";
                }
            } 
            else if(type === 'settings') {
                title.innerText = '설정 ⚙️';
                body.innerHTML = `
                    <div class="setting-row">
                        <span>다크 모드</span>
                        <label class="switch"><input type="checkbox" ${game.darkMode ? 'checked' : ''} onchange="toggleDarkMode()"><span class="slider"></span></label>
                    </div>
                `;
            }

            document.getElementById('modal-overlay').style.display = 'flex';
            setTimeout(() => { document.getElementById('main-modal').style.transform = 'translateY(0)'; }, 10);
        };

        // 🚨 상점 구매 및 장착 로직
        window.buyItem = (type, itemId, price, colorCode = null) => {
            if(game.gold < price) { showToast("골드가 부족합니다! 💸"); return; }
            
            game.gold -= price;
            if(type === 'icon') {
                game.ownedIcons.push(itemId);
                game.profileIcon = itemId; // 자동 장착
                showToast("새로운 아이콘을 획득했습니다! 🎉");
            } else if (type === 'color') {
                game.ownedColors.push(itemId);
                game.profileColor = colorCode; // 자동 장착
                showToast("새로운 배경색을 획득했습니다! 🎨");
            }
            saveGameToDB();
            openModal('shop'); // UI 리렌더링
        };

        window.equipItem = (type, val) => {
            if(type === 'icon') game.profileIcon = val;
            else if(type === 'color') game.profileColor = val;
            
            showToast("프로필이 변경되었습니다!");
            saveGameToDB();
            openModal('shop');
        };

        window.closeModal = () => {
            document.getElementById('main-modal').style.transform = 'translateY(100%)';
            setTimeout(() => { document.getElementById('modal-overlay').style.display = 'none'; }, 400);
        };

        window.toggleDarkMode = () => {
            game.darkMode = !game.darkMode;
            document.body.classList.toggle('dark-mode');
            saveGameToDB();
        };

        function setupBottomSheet() {
            const modalContent = document.getElementById('main-modal');
            const dragZone = document.getElementById('dragZone');
            let startY = 0;
            dragZone.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; modalContent.style.transition = 'none'; }, {passive: true});
            dragZone.addEventListener('touchmove', (e) => { let y = e.touches[0].clientY - startY; if (y > 0) modalContent.style.transform = `translateY(${y}px)`; }, {passive: true});
            dragZone.addEventListener('touchend', (e) => { modalContent.style.transition = 'transform 0.4s cubic-bezier(0.15, 0, 0.15, 1)'; closeModal(); });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.top = '30px';
            setTimeout(() => { t.style.top = '-100px'; }, 3000);
        }

        // 🚨 게임 루프 - Score 로직 및 사이드바 프로필 업데이트 추가
        function gameLoop() {
            let income = 0;
            game.slots.forEach(lv => { if(lv) income += Math.floor(Math.pow(1.5, lv - 1)) || 1; });
            
            game.gold += income;
            game.score += income; // 랭킹용 누적 점수
            
            document.getElementById('gold-val').innerText = Math.floor(game.gold).toLocaleString();
            document.getElementById('gps-val').innerText = Math.floor(income).toLocaleString();
            
            // 사이드바 실시간 렌더링
            if(auth.currentUser) {
                document.getElementById('sb-avatar').innerText = game.profileIcon;
                document.getElementById('sb-avatar').style.background = game.profileColor;
                document.getElementById('sb-nickname').innerText = auth.currentUser.displayName || "셰프";
                document.getElementById('sb-score').innerText = `🏆 ${Math.floor(game.score).toLocaleString()}`;
            }

            setTimeout(gameLoop, 1000);
        }

        function saveGameToDB() {
            if(!auth.currentUser) return;
            
            game.lastSaveTime = Date.now();
            const userRef = doc(db, "users", auth.currentUser.uid);
            
            setDoc(userRef, { 
                nickname: auth.currentUser.displayName,
                totalGold: Math.floor(game.gold), // 보유 잔액
                score: Math.floor(game.score),    // 누적 랭킹 점수
                maxLv: game.maxLv,
                slots: game.slots,
                lastSaveTime: game.lastSaveTime,
                darkMode: game.darkMode,
                profileIcon: game.profileIcon,
                profileColor: game.profileColor,
                ownedIcons: game.ownedIcons,
                ownedColors: game.ownedColors
            }, { merge: true }).catch(e => console.log("DB 저장 에러:", e));
        }

        async function loadGameFromDB(user) {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            
            if(snap.exists()) {
                const data = snap.data();
                game.gold = data.totalGold || 0;
                game.score = data.score || data.totalGold || 0; // 구버전 유저 하위호환
                game.maxLv = data.maxLv || 1;
                game.slots = data.slots || Array(16).fill(null);
                game.lastSaveTime = data.lastSaveTime || Date.now();
                game.darkMode = data.darkMode || false;
                
                // 프로필/인벤토리 로드
                game.profileIcon = data.profileIcon || "👨‍🍳";
                game.profileColor = data.profileColor || "#f5f5f7";
                game.ownedIcons = data.ownedIcons || ["👨‍🍳"];
                game.ownedColors = data.ownedColors || ["color_default"];

                document.querySelectorAll('.slot').forEach(s => s.innerHTML = '');
                game.slots.forEach((lv, i) => { if(lv) addItem(lv, i, false); });
                
                if(game.darkMode) document.body.classList.add('dark-mode');

                if (game.lastSaveTime) {
                    let offlineSeconds = Math.floor((Date.now() - game.lastSaveTime) / 1000);
                    if (offlineSeconds > 86400) offlineSeconds = 86400; 
                    if (offlineSeconds > 60) {
                        let currentGps = 0;
                        game.slots.forEach(lv => { if(lv) currentGps += Math.floor(Math.pow(1.5, lv - 1)) || 1; });
                        let offlineGold = offlineSeconds * currentGps;
                        if (offlineGold > 0) {
                            game.gold += offlineGold;
                            game.score += offlineGold; // 오프라인 수익도 스코어에 추가
                            setTimeout(() => { showToast(`오프라인 수익: $${offlineGold.toLocaleString()} 획득! 👨‍🍳`); }, 1500);
                        }
                    }
                }
            } else {
                saveGameToDB();
            }

            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        }

        window.loginWithGoogle = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch((error) => { showToast("로그인에 실패했습니다."); });
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('login-screen').style.display = 'none', 500);
                document.getElementById('loading-screen').style.display = 'flex';
                document.getElementById('loading-screen').style.opacity = '1';
                
                showToast(`${user.displayName} 셰프님 환영합니다!`);
                loadGameFromDB(user);
                
                document.getElementById('logout-btn').onclick = () => {
                    signOut(auth).then(() => { window.location.reload(); });
                };

                if(dbSaveTimer) clearInterval(dbSaveTimer);
                dbSaveTimer = setInterval(saveGameToDB, 10000);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('login-screen').style.opacity = '1';
                document.getElementById('loading-screen').style.display = 'none';
            }
        });

        window.addEventListener("beforeunload", () => { if(auth.currentUser) saveGameToDB(); });

        initGrid();
        setupBottomSheet();
        gameLoop();
    </script>
</body>
</html>
